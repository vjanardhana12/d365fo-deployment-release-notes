# =============================================================================
# Reusable release-notes stage for D365 F&O pipelines.
#
# Usage in your pipeline:
#   stages:
#   - stage: Build
#     ...
#   - template: pipelines/release-notes-stage.yaml
#     parameters:
#       wikiRepoUrl: 'https://yourorg@dev.azure.com/yourorg/YourProject/_git/YourProject.wiki'
#       branchFolder: 'Main-branch'
#       templateFile: 'release-notes-template/release-notes-template.md'
#       packagesConfigPaths: |
#         $(Build.SourcesDirectory)\src\xpp\xppBuild\AzureBuild\packages.config
#         $(Build.SourcesDirectory)\src\xpp\xppBuild\AzureBuild\SubFolder\packages.config
#       foundationPackagePattern: 'YourFoundationModuleNamePrefix'    # regex to identify foundation packages
# =============================================================================

parameters:
  - name: wikiRepoUrl
    type: string
    displayName: 'Wiki repo URL (project wiki git URL)'
  - name: branchFolder
    type: string
    default: 'Main-branch'
    displayName: 'Branch sub-folder (Main-branch, Prod-branch, etc.)'
  - name: templateFile
    type: string
    default: 'release-notes-template/release-notes-template.md'
  - name: packagesConfigPaths
    type: string
    default: ''
    displayName: 'Newline-separated list of packages.config paths'
  - name: foundationPackagePattern
    type: string
    default: ''
    displayName: 'Regex to identify foundation packages (e.g., YourFoundationModuleNamePrefix). Others are ISV.'
  - name: dependsOn
    type: string
    default: 'Build'

stages:
- stage: ReleaseNotes
  displayName: 'Release notes'
  dependsOn: ${{ parameters.dependsOn }}
  condition: succeededOrFailed()
  jobs:
  - job: GenerateReleaseNotes
    displayName: 'Generate Release Notes'
    steps:
    - task: XplatGenerateReleaseNotes@4
      inputs:
        outputfile: '$(Build.ArtifactStagingDirectory)/releaseNotes.md'
        templateLocation: 'File'
        templatefile: '${{ parameters.templateFile }}'
        checkStage: true
        replaceFile: false
        getParentsAndChildren: true
        getAllParents: true
        getIndirectPullRequests: false
        stopOnError: false
        considerPartiallySuccessfulReleases: false
        checkForManuallyLinkedWI: false
        wiqlFromTarget: 'WorkItems'
        removeDuplicateWorkItems: true

    - checkout: self
      fetchDepth: 2
      persistCredentials: true

    - task: PowerShell@2
      displayName: 'Enrich release notes (packages + entity changes)'
      continueOnError: true
      inputs:
        targetType: 'inline'
        script: |
          $filePath = "$(Build.ArtifactStagingDirectory)/releaseNotes.md"
          if (-not (Test-Path $filePath)) { Write-Warning "File not found: $filePath"; return }
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          $content = [System.IO.File]::ReadAllText($filePath, $utf8)
          $foundationPattern = '${{ parameters.foundationPackagePattern }}'

          # --- NuGet / ISV Package Versions ---
          $pkgPaths = @'
          ${{ parameters.packagesConfigPaths }}
          '@ -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          $pkgRows = @()
          foreach ($pf in $pkgPaths) {
            if (Test-Path $pf) {
              [xml]$xml = Get-Content $pf
              foreach ($p in $xml.packages.package) {
                $cat = if ($p.id -match '^Microsoft\.Dynamics') { 'Platform' }
                       elseif ($foundationPattern -and $p.id -match "(?i)$foundationPattern") { 'Foundation' }
                       else { 'ISV' }
                $pkgRows += "| $($p.id) | $($p.version) | $cat |"
              }
            }
          }

          # Data entity counts are already surfaced by Update-WikiReleaseNotes.ps1
          # in the "Post-Deployment Actions" -> "New objects introduced" block,
          # plus a "Data entities changed" reminder. The Compare link in the
          # metadata table covers full file-level detail, so no separate
          # Data Entity Changes section is emitted here.

          # --- Append Package Versions at the very end ---
          if ($pkgRows) {
            $pkgSection  = "`r`n# Package Versions`r`n`r`n"
            $pkgSection += "| **Package** | **Version** | **Category** |`r`n"
            $pkgSection += "|---|---|---|`r`n"
            $pkgSection += ($pkgRows -join "`r`n") + "`r`n"
            $content += $pkgSection
          }
          [System.IO.File]::WriteAllText($filePath, $content, $utf8)
          Write-Host "Enrichment complete."

    - task: PowerShell@2
      displayName: 'Clean up release notes (HTML decode, strip raw tags)'
      continueOnError: true
      inputs:
        targetType: 'inline'
        script: |
          # NOTE: This step intentionally keeps empty sections (the template
          # renders a single static '_No xxx linked to this build._' row per
          # section when there's no data). Reviewers prefer to see the full
          # table of contents on every page even when sections are empty.
          $filePath = "$(Build.ArtifactStagingDirectory)/releaseNotes.md"
          if (-not (Test-Path $filePath)) { Write-Warning "File not found: $filePath"; return }
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          $content = [System.IO.File]::ReadAllText($filePath, $utf8)
          Add-Type -AssemblyName System.Web
          # Decode any HTML entities the template engine introduced.
          $content = [System.Web.HttpUtility]::HtmlDecode($content)
          # Strip any raw HTML tags that leaked through (keep HTML comments
          # such as <!-- ENV-PROGRESS-BLOCK --> intact).
          $content = [regex]::Replace($content, '<(?!!--)[^>]*?>', '')
          [System.IO.File]::WriteAllText($filePath, $content, $utf8)
          Write-Host "Cleaned release notes (HTML decode + tag strip)."

    - task: richardfennellBM.BM-VSTS-WIKIUpdater-Tasks.WikiUpdaterTask.WikiUpdaterTask@3
      displayName: 'Publish release notes to wiki'
      continueOnError: true
      inputs:
        repo: '${{ parameters.wikiRepoUrl }}'
        branch: 'wikiMaster'
        filename: 'Deployment-release-notes/${{ parameters.branchFolder }}/Build-$(Build.BuildNumber).md'
        dataIsFile: true
        sourceFile: '$(Build.ArtifactStagingDirectory)/releaseNotes.md'
        message: 'Creating wiki'
        gitname: 'Pipeline'
        gitemail: 'pipeline@local'
        useAgentToken: true
        injectExtraHeader: false

    - task: PowerShell@2
      displayName: 'Sort wiki .order (newest build first)'
      continueOnError: true
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      inputs:
        targetType: 'inline'
        script: |
          $folder  = 'Deployment-release-notes/${{ parameters.branchFolder }}'
          $wikiUrl = '${{ parameters.wikiRepoUrl }}'
          $work    = Join-Path $env:AGENT_TEMPDIRECTORY "wiki-order-$([guid]::NewGuid())"
          git -c http.extraheader="Authorization: Bearer $($env:SYSTEM_ACCESSTOKEN)" -c core.longpaths=true clone --depth 1 --branch wikiMaster $wikiUrl $work
          if ($LASTEXITCODE -ne 0) { Write-Warning "Wiki clone failed"; return }
          Push-Location $work
          git config user.email 'pipeline@local'
          git config user.name  'Pipeline'
          $files = Get-ChildItem (Join-Path $work $folder) -Filter 'Build-*.md' -ErrorAction SilentlyContinue
          if (-not $files) { Pop-Location; Write-Host "No Build-*.md pages yet"; return }
          $sorted = $files | Sort-Object @{Expression = {
              $name = $_.BaseName -replace '^Build-',''
              try { [version]$name } catch { [version]'0.0.0.0' }
            }; Descending = $true}
          $orderPath = Join-Path $work "$folder/.order"
          $names = $sorted | ForEach-Object { $_.BaseName }
          [System.IO.File]::WriteAllLines($orderPath, $names, (New-Object System.Text.UTF8Encoding($false)))
          git add "$folder/.order"
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Pop-Location; Write-Host '.order up-to-date'; return }
          git commit -m "Sort .order (newest first) for $folder" | Out-Null
          git -c http.extraheader="Authorization: Bearer $($env:SYSTEM_ACCESSTOKEN)" push origin wikiMaster
          Pop-Location
          Write-Host "Updated .order ($($names.Count) builds)."

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/releaseNotes.md'
        ArtifactName: 'releaseNotes'
        publishLocation: 'Container'
